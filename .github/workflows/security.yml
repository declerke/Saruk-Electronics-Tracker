name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC

jobs:
  security-audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on installed packages
        # GHSA-w75w-9qv4-j5xj: dbt-common path traversal CVE — fix requires dbt-core 1.34+ upgrade
        run: pip-audit --local --progress-spinner off --ignore-vuln GHSA-w75w-9qv4-j5xj
