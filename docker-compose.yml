x-airflow-common: &airflow-common
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Airflow 3.0 SimpleAuthManager
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: 'admin:admin'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
    AIRFLOW__API_AUTH__JWT_SECRET: 'saruk-jwt-secret-changeme'
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: 'saruk-internal-secret-2024-shared'
    # Execution API server URL (required for Airflow 3.0 task execution)
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-api-server:8080/execution/'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # App database connection (Docker internal port 5432)
    APP_DB_HOST: postgres
    APP_DB_PORT: '5432'
    APP_DB_NAME: saruk_db
    APP_DB_USER: postgres
    APP_DB_PASSWORD: postgres
    PYTHONPATH: '/opt/airflow'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scraper:/opt/airflow/scraper
    - ./dbt:/opt/airflow/dbt
    - ./tests:/opt/airflow/tests
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  # ─── App PostgreSQL (product data + dbt models) ────────────────────────────
  postgres:
    image: postgres:15
    container_name: saruk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saruk_db
    ports:
      - "5433:5432"
    volumes:
      - saruk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saruk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Airflow metadata PostgreSQL ───────────────────────────────────────────
  postgres-airflow:
    image: postgres:15
    container_name: saruk_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5438:5432"
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Airflow init ──────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: saruk_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
    restart: "no"

  # ─── Airflow API server (replaces 'webserver' in Airflow 3.0) ─────────────
  airflow-api-server:
    <<: *airflow-common
    container_name: saruk_airflow_webserver
    restart: unless-stopped
    ports:
      - "8082:8080"
    command: api-server --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: saruk_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow dag-processor (Airflow 3.0 requirement) ──────────────────────
  airflow-dag-processor:
    <<: *airflow-common
    container_name: saruk_airflow_dag_processor
    restart: unless-stopped
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow triggerer ─────────────────────────────────────────────────────
  airflow-triggerer:
    <<: *airflow-common
    container_name: saruk_airflow_triggerer
    restart: unless-stopped
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: saruk_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ''
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  saruk_pgdata:
    name: saruk-electronics-tracker_saruk_pgdata
    external: true
  airflow_pgdata:
    name: saruk-electronics-tracker_airflow_pgdata
    external: true
  airflow_logs:
    name: saruk-electronics-tracker_airflow_logs
    external: true
  grafana_data:
    name: saruk-electronics-tracker_grafana_data
    external: true
